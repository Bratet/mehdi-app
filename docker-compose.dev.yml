version: '3.8'

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gamecenter}:${POSTGRES_PASSWORD:-gamecenterpass}@db:5432/${POSTGRES_DB:-gamecenterdb}

  frontend:
    command: npm run dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
