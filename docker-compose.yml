version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: slouge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slouge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slougepass}
      POSTGRES_DB: ${POSTGRES_DB:-slougedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5480:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slouge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slouge_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-slouge}:${POSTGRES_PASSWORD:-slougepass}@db:5432/${POSTGRES_DB:-slougedb}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000}
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slouge_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "4000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
